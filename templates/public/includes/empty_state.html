<div class="row justify-content-center empty-state-wrap">
  <div class="col-md-6 text-center">
    <i class="bi {{ empty_icon | default('bi-inbox') }} empty-state-icon"></i>
    <h4 class="mt-3 mb-2">{{ empty_title | default('No hay registros todavía') }}</h4>
    <p class="text-muted mb-4">{{ empty_message | default('Cuando agregues el primero, va a aparecer acá.') }}</p>
    {% if empty_cta_url %}
    <a href="{{ empty_cta_url }}" class="btn btn-primary">
      <i class="bi bi-plus-lg"></i>
      {{ empty_cta_label | default('Agregar') }}
    </a>
    {% endif %}
  </div>
</div>
