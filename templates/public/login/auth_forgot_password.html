{% extends 'public/login/base_login.html' %}
<!---->
{% block title %}Crud con Python 🐍 | crear cuenta{% endblock %}
<!---->
{% block body %}

<div class="container-xxl">
  <div class="authentication-wrapper authentication-basic container-p-y">
    <div class="authentication-inner py-4">
      <div class="card">
        <div class="card-body">
          <div class="app-brand justify-content-center mb-3">
            <div style="text-align:center;margin-bottom:8px;">
              <span style="background:#1a56db;color:#fff;padding:8px 14px;border-radius:10px;font-weight:700;font-size:18px;letter-spacing:1px;">BS</span>
            </div>
            <h4 style="text-align:center;color:#1e293b;font-weight:700;margin-bottom:4px;">Broker Suite</h4>
          </div>

          <form id="formAuthentication" class="mb-3" action="{{ url_for('cpanelRecoveryPassUser') }}" method="POST"
            onsubmit="var btn = this.querySelector('button'); btn.disabled = true; btn.innerHTML = 'Enviando... <i class=\'bi bi-arrow-right-circle\'></i>';">
            <div class="mb-3">
              <label for="email_user" class="form-label">
                Escribe tu Email
              </label>
              <input type="text" class="form-control" name="email_user" required autofocus />
            </div>

            <button class="btn btn-primary w-100">
              Recuperar clave
              <i class="bi bi-arrow-right-circle"></i>
            </button>
          </form>
          <div class="text-center">
            <a href="{{ url_for('inicio') }}" class="d-flex align-items-center justify-content-center">
              <i class="bx bx-chevron-left scaleX-n1-rtl bx-sm"></i>
              volver
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
