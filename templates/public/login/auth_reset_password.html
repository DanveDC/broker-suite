{% extends 'public/login/base_login.html' %}

{% block title %}Restablecer contraseña | Cabal{% endblock %}

{% block body %}

<div class="container-xxl">
    <div class="authentication-wrapper authentication-basic container-p-y">
        <div class="authentication-inner py-4">
            <div class="card">
                <div class="card-body">
                    <div class="app-brand justify-content-center">
                        <span class="app-brand-logo">
                            <img class="logo" src="{{ url_for('static', filename ='assets/img/cabal.png') }}"
                                alt="Logo" />
                        </span>
                    </div>

                    <h4 class="mb-2">Restablecer Contraseña 🔒</h4>
                    <p class="mb-4">Ingresa tu nueva contraseña a continuación.</p>

                    <form id="formAuthentication" class="mb-3" action="" method="POST">
                        <div class="mb-3 form-password-toggle">
                            <label class="form-label" for="pass_user">Nueva Contraseña</label>
                            <div class="input-group input-group-merge">
                                <input type="password" id="pass_user" class="form-control" name="pass_user"
                                    placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                                    aria-describedby="password" required autofocus />
                                <span class="input-group-text cursor-pointer"><i class="bx bx-hide"></i></span>
                            </div>
                        </div>

                        <div class="mb-3 form-password-toggle">
                            <label class="form-label" for="repetir_pass_user">Confirmar Contraseña</label>
                            <div class="input-group input-group-merge">
                                <input type="password" id="repetir_pass_user" class="form-control"
                                    name="repetir_pass_user"
                                    placeholder="&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;&#xb7;"
                                    aria-describedby="password" required />
                                <span class="input-group-text cursor-pointer"><i class="bx bx-hide"></i></span>
                            </div>
                        </div>

                        <button class="btn btn-primary w-100 mb-3">
                            Cambiar contraseña
                        </button>

                        <div class="text-center">
                            <a href="{{ url_for('inicio') }}">
                                <i class="bx bx-chevron-left scaleX-n1-rtl bx-sm"></i>
                                Volver al login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block customJS %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const togglePassword = document.querySelectorAll('.form-password-toggle .input-group-text');

        togglePassword.forEach(function (element) {
            element.style.cursor = 'pointer'; // Asegurar cursor de mano
            element.addEventListener('click', function (e) {
                // Buscamos el input dentro del mismo grupo, más seguro que previousElementSibling
                const inputGroup = this.closest('.input-group');
                const input = inputGroup.querySelector('input');
                const icon = this.querySelector('i');

                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('bx-hide');
                    icon.classList.add('bx-show');
                } else {
                    input.type = 'password';
                    icon.classList.remove('bx-show');
                    icon.classList.add('bx-hide');
                }
            });
        });
    });
</script>
{% endblock %}
