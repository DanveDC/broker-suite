{% block customCSS %}
<link rel="stylesheet" href="{{ url_for('static', filename='assets/css/file.css') }}" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
<style>
  /* Estilos existentes para body y root */
  body {
    background: linear-gradient(135deg, var(--sidebar-bg) 0%, var(--primary-hover) 50%, var(--primary) 100%);
    min-height: 100vh;
    color: #333;
  }

  :root {
    --font: 'Inter', 'Open Sans', sans-serif;
  }

  .wrap-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
  }

  /* Premium Switch Side-Drawer Styling */
  .side-drawer {
    position: absolute;
    top: 50%;
    left: 100%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    z-index: 100;
    transition: all 0.3s ease;
  }

  .drawer-trigger {
    width: 30px;
    height: 60px;
    background: var(--primary);
    /* Púrpura que combina con el botón primario */
    color: white;
    border-radius: 0 10px 10px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    font-size: 1.2rem;
    flex-shrink: 0;
    transition: all 0.3s ease;
  }

  .drawer-trigger i {
    transition: transform 0.4s ease;
  }

  .side-drawer:hover .drawer-trigger i {
    transform: rotate(180deg);
  }

  .drawer-content {
    background: white;
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0;
    max-width: 0;
    overflow: hidden;
    border-radius: 0 10px 10px 0;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    border: none;
    box-shadow: none;
  }

  .side-drawer:hover .drawer-content {
    max-width: 150px;
    /* Reduced since labels are shorter */
    padding: 0 15px;
    box-shadow: 10px 0 20px rgba(0, 0, 0, 0.15);
    border: 1px solid #eee;
    border-left: none;
  }

  .drawer-trigger:hover {
    background: var(--primary-hover);
    /* Tono morado para el hover */
    width: 35px;
  }

  .switch-container {
    display: flex;
    align-items: center;
    gap: 8px;
    /* Reduced gap */
    white-space: nowrap;
    min-width: 100px;
    /* Reduced min-width */
    margin: 0;
    padding: 0;
    background: transparent;
    border: none;
    backdrop-filter: none;
  }

  .switch-label {
    font-size: 1.1rem;
    font-weight: 700;
    color: #6c757d;
    transition: all 0.3s ease;
  }

  .switch-label.active-nacional {
    color: var(--primary);
  }

  .switch-label.active-internacional {
    color: var(--accent-success) !important;
    text-shadow: 0 0 5px rgba(95, 248, 194, 0.4);
  }

  .form-switch .form-check-input {
    width: 2.5em;
    height: 1.25em;
    cursor: pointer;
    background-color: #d1d1d1;
    border-color: #d1d1d1;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23fff'/%3e%3csvg%3e");
    transition: background-position 0.15s ease-in-out, background-color 0.3s ease-in-out;
    margin-left: 0;
  }

  .form-check-input:checked {
    background-color: var(--accent-success);
    border-color: var(--accent-success);
    box-shadow: 0 0 8px var(--accent-success);
  }

  .form-check-input:focus {
    border-color: var(--accent-success);
    box-shadow: 0 0 0 0.25rem var(--accent-success);
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23fff'/%3e%3csvg%3e");
  }

  .authentication-inner {
    position: relative;
    overflow: visible;
  }
</style>
{% endblock %}
