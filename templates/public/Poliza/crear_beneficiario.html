{% extends 'public/base_cpanel.html' %}
<!--Cambiando el title-->
{% block title %} Registrar company {% endblock %}
<!---->
{% block customCSS %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename ='assets/css/file.css') }}" />
{% endblock %}

<!--Inicio del block-->
{% block body %}
<div class="card" style="border-radius: 0px !important">
  <div class="row justify-content-center mb-2">
    <div class="col-md-12">
      <h3 class="text-center mt-5 mb-3">REGISTRAR BENEFICIARIO</h3>
      <hr />
    </div>
  </div>

  <div class="row justify-content-center mb-2">
    <div class="col-md-10">
      <form
        id="formulario"
        class="form-horizontal mx-auto"
        method="POST"
        action="/form-registrar-beneficiario"
        autocomplete="off"
        enctype="multipart/form-data">
        <div class="card-body">
          <div class="row">
            <div class="col-md-6">
              <label for="nombre_beneficiario" class="form-label">
                Nombre
              </label>
              <input
                type="text"
                name="nombre_beneficiario"
                class="form-control"
                required />
            </div>
            <div class="col-md-6">
              <label for="Apellido_beneficiario" class="form-label">
                Apellido
              </label>
              <input
                class="form-control"
                type="text"
                name="Apellido"
                required />
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <label for="Cedula" class="form-label">
                Cedula
              </label>
              <input
                type="text"
                name="Cedula"
                class="form-control"
                required />
            </div>
            <div class="col-md-6">
              <label for="Parentesco" class="form-label">
                Parentesco
              </label>
              <input
                class="form-control"
                type="text"
                name="Parentesco"
                required />
            </div>
          </div>
          <input type="hidden" id="cod" name="cod">


          <div class="mb-3 mt-4 text-center">
            <button type="submit" class="btn rounded-pill btn-primary" id="miBoton">
              Guardar registro ahora
              <i class="bi bi-arrow-clockwise"></i>
            </button>
            <div id="spinner" style="display: none;">Cargando...</div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %} {% block customJS %}
<script src="{{ url_for('static', filename ='assets/customJS/file.js') }}"></script>
<script> const campoOculto = document.getElementById('cod');
        const cod = JSON.parse('{{ cod_poliza | tojson }}');
        campoOculto.value=cod; 
  
         
</script>

<script>
  const boton1 = document.getElementById('miBoton');
  const formulario = document.getElementById('formulario'); // Reemplaza 'tuFormulario' con el ID real de tu formulario
  
  
  formulario.addEventListener('submit', function() {
    boton1.disabled = true;
    boton1.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Cargando...';
     
  });
   
  </script>
  


{% endblock %}
