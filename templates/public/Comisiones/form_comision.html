{% extends 'public/base_cpanel.html' %}
<!--Cambiando el title-->
{% block title %} Registrar comision {% endblock %}
<!---->
{% block customCSS %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename ='assets/css/file.css') }}" />
{% endblock %}

<!--Inicio del block-->
{% block body %}
<div class="card" style="border-radius: 0px !important">
  <div class="row justify-content-center mb-2">
    <div class="col-md-12">
      <h3 class="text-center mt-5 mb-3">REGISTRAR COMISION</h3>
      <hr />
    </div>
  </div>

  <div class="row justify-content-center mb-2">
    <div class="col-md-10">
        <form
            id="formulario"
            class="form-horizontal mx-auto"
            method="POST"
            action="/form_registrar_comision"
            autocomplete="off"
            enctype="multipart/form-data">
                <div class="row mt-4">
                    <div class="col-md-4">
                        <label class="form-label">Comisión</label>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="agente_nuevo" class="form-label">Nuevo</label>
                                <input type="number" id="agente_nuevo" name="comision" class="form-control" step="0.01" />
                            </div>    
                        </div>
                    </div>

                    
                        <input type="hidden" id="Cod_renovacion" name="cod_renovacion">
                
                </div>

                <div class="mb-3 mt-4 text-center">
                    <button type="submit" class="btn rounded-pill btn-primary" id="miBoton">
                        Guardar registro ahora
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                    <div id="spinner" style="display: none;">Cargando...</div>
                </div>
        </form>
    </div>
  </div>
</div>
{% endblock %} {% block customJS %}
<script src="{{ url_for('static', filename ='assets/customJS/file.js') }}"></script>
<script>
const boton = JSON.parse('{{ cod_renovacion | tojson }}');
const cod = document.getElementById('Cod_renovacion');
cod.value = boton;


</script>


<script>
  const boton1 = document.getElementById('miBoton');
  const formulario = document.getElementById('formulario'); // Reemplaza 'tuFormulario' con el ID real de tu formulario
  
  
  formulario.addEventListener('submit', function() {
    boton1.disabled = true;
    boton1.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Cargando...';
     
  });
   
  </script>
  

{% endblock %}
