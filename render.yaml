services:
  - type: web
    name: broker-suite
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python wsgi.py
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: broker-db
          property: connectionString

databases:
  - name: broker-db
    plan: free
